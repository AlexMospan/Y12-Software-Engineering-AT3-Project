<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx AI - Authentication</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: relative; z-index: 10; }
        .auth-box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px) saturate(350%) brightness(2); -webkit-backdrop-filter: blur(40px) saturate(350%) brightness(2); border: 1px solid rgba(255, 255, 255, 0.14); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; color: white; text-align: center; }
        .auth-box h2 { margin-bottom: 24px; font-size: 24px; }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.14); padding: 12px 16px; border-radius: 12px; color: white; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .auth-field:focus { border-color: rgba(255, 255, 255, 0.4); }
        .auth-btn { background: white; color: black; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
        .auth-btn:hover { opacity: 0.9; }
        .toggle-mode { margin-top: 20px; font-size: 14px; color: rgba(255, 255, 255, 0.6); cursor: pointer; text-decoration: underline; }
        .error-msg { color: #ff6b6b; font-size: 14px; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="glow-container"></div>
        <div class="auth-wrapper">
            <div class="auth-box">
                <h2 id="auth-title">Login to Onyx</h2>
                <div class="auth-form">
                    <input type="text" id="username" class="auth-field" placeholder="Username" required>
                    <input type="password" id="password" class="auth-field" placeholder="Password" required>
                    <button id="submit-btn" class="auth-btn">Sign In</button>
                </div>
                <div id="error-message" class="error-msg"></div>
                <div id="toggle-auth" class="toggle-mode">Don't have an account? Sign Up</div>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        const toggleBtn = document.getElementById("toggle-auth");
        const title = document.getElementById("auth-title");
        const submitBtn = document.getElementById("submit-btn");
        const errorDiv = document.getElementById("error-message");

        toggleBtn.addEventListener("click", () => {
            isLoginMode = !isLoginMode;
            title.textContent = isLoginMode ? "Login to Onyx" : "Create Account";
            submitBtn.textContent = isLoginMode ? "Sign In" : "Sign Up";
            toggleBtn.textContent = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Sign In";
            errorDiv.textContent = "";
        });

        submitBtn.addEventListener("click", async () => {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            errorDiv.textContent = "";

            if (!username || !password) {
                errorDiv.textContent = "Please fill in all fields.";
                return;
            }

            const endpoint = isLoginMode ? "/login" : "/register";
            try {
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (response.ok) {
                    if (isLoginMode) {
                        window.location.href = data.redirect;
                    } else {
                        isLoginMode = true;
                        title.textContent = "Login to Onyx";
                        submitBtn.textContent = "Sign In";
                        toggleBtn.textContent = "Don't have an account? Sign Up";
                        errorDiv.style.color = "#4caf50";
                        errorDiv.textContent = "Registration successful! Please log in.";
                        document.getElementById("password").value = "";
                    }
                } else {
                    errorDiv.style.color = "#ff6b6b";
                    errorDiv.textContent = data.message || "An error occurred.";
                }
            } catch (err) {
                errorDiv.textContent = "Cannot connect to server.";
            }
        });
    </script>
</body>
</html>
