<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <meta http-equiv="X-UA-Compatible" content="ie=edge" /> 
    <!-- This line blocks cross site scripting --> 
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'; worker-src 'self';">

    <title>Chatbot Demo</title> 

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.png') }}"> 
</head> 

<div class="wrapper">
    <div class="app-container">
        <!-- Background Elements -->
        <div class="glow-blob purple-one"></div>
        <div class="glow-blob purple-two"></div>
        <div class="wave-line line-one"></div>

        <!-- Sidebar (Left Column) -->
        <aside id="sidebar" class="glass_sidebar">
            <!-- The button stays right here inside the sidebar panel -->
            <button id="toggleBtn" class="sidebar-toggle">☰</button>
            
            <!-- This wrapper will handle hiding the text links and titles -->
            <div id="sidebar-inner" class="sidebar-content">
                <h2 style="color:white">Chatbot Demo</h2>
                <nav>
                    <a href="#home">Home</a>
                </nav>
            </div>
        </aside>

        <!-- Main Content Area (Right Column) -->
        <main id="main-content" class="main-content">   
            <h1 style="color:white">Ask Anything</h1>
            
            <!-- Input container -->
            <div class="input-box">
                <input type="text" class="centered-textbox" placeholder="Enter your text here">
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</div>
